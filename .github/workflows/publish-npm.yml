name: publish-npm

# Build the wasm-pack bundler package (wasm/ -> wasm/pkg) and publish it to npmjs as
# @dignetwork/dig-keystore-wasm. Auth uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
# The npm CLI exchanges this workflow's GitHub Actions OIDC token for a short-lived publish
# credential; npm-side, the trusted publisher must be configured for org DIG-Network, repo
# dig-keystore, workflow publish-npm.yml. Runs when a GitHub Release is published, when a
# version tag is pushed, or on manual dispatch.
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build wasm + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - name: install wasm-pack (official installer)
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: build wasm package (wasm-pack bundler -> wasm/pkg)
        working-directory: wasm
        run: npm run build:bundler
      - name: upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version
      - name: publish to npmjs
        working-directory: wasm
        run: npm publish ./pkg --access public
