name: publish-npm

# Build the wasm-pack bundler package (wasm/ -> wasm/pkg) and publish it to npmjs as
# @dignetwork/dig-keystore-wasm. Auth uses the org-level NPM_TOKEN secret (must be granted to
# this repo in the org secret's repository-access list). Runs when a GitHub Release is
# published, when a version tag is pushed, or on manual dispatch.
#
# NOTE (dig_ecosystem #70): the org NPM_TOKEN is currently broken (404s on every npm-publishing
# repo). This workflow is wired and ready; the `npm publish` step is expected to fail with a 404
# until #70 is resolved. That failure does NOT block the crates.io release (publish.yml) or the
# tag-on-merge changelog flow (release.yml) — this workflow is independent and additive.
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: build wasm + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - name: install wasm-pack (official installer)
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: build wasm package (wasm-pack bundler -> wasm/pkg)
        working-directory: wasm
        run: npm run build:bundler
      - name: publish to npmjs
        working-directory: wasm
        run: npm publish ./pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
